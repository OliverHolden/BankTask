name: Integration Tests
on:
  workflow_call: {}

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run integration tests (only *IntegrationTest)
        run: mvn -B -Dspring.profiles.active=dev -Dtest="**/*IntegrationTest" test
