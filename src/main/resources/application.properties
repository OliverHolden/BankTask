spring.application.name=eagle-bank

# H2
spring.datasource.url=jdbc:h2:mem:eaglebank;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Swagger — disabled by default, enabled in application-dev.properties
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# JWT
# jwt.secret must be supplied via the active profile or environment variable - see application-dev.properties
jwt.expiration-ms=3600000
